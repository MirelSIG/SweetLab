services:
  - type: web
    name: sweetlab-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/server.js
    envVars:
      - key: MONGO_URI
        scope: build,runtime
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
