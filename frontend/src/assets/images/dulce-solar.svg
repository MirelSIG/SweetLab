<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title>Dulce Solar de Frutas</title>
  <desc>Ilustración local para el postre frutal brillante.</desc>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="55%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#g)"/>
  <circle cx="900" cy="160" r="140" fill="rgba(255,255,255,0.18)"/>
  <circle cx="280" cy="560" r="180" fill="rgba(255,255,255,0.12)"/>
  <rect x="225" y="240" rx="36" ry="36" width="750" height="320" fill="rgba(255,255,255,0.16)"/>
  <text x="600" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="72" font-weight="700" fill="#fff">Dulce</text>
  <text x="600" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" fill="#fff">Solar</text>
